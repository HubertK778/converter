name: Build exe

on:
  schedule:
    - cron: '0 0 * * 0'
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Download repo
        uses: actions/checkout@v3

      - name: Install deps
        shell: bash
        run: |
          ./installDeps.sh
          
      - name: Build exe
        shell: bash
        run: |
          pyinstaller --onefile converter.py

      - name: Uploada artifact
        uses: actions/upload-artifact@v3
        with:
          name: exe-app
          path: dist/*.exe
